name: Quality Check

on:
  push:
    branches-ignore:
      - "release/**"
    paths-ignore:
      - "*.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and analyze
    runs-on: macos-latest
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Clone JUCE
        run: git clone --depth 1 --branch 8.0.6 https://github.com/juce-framework/JUCE.git /tmp/JUCE

      - name: Configure CMake
        run: >
          cmake -S . -B build-ci
          -DJUCE_PATH=/tmp/JUCE
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DCMAKE_CXX_FLAGS="-fprofile-instr-generate -fcoverage-mapping"
          -DCMAKE_C_FLAGS="-fprofile-instr-generate -fcoverage-mapping"
          -DCMAKE_EXE_LINKER_FLAGS="-fprofile-instr-generate"

      - name: Build Tests
        run: cmake --build build-ci --target BoomBabyTests -- -j$(sysctl -n hw.ncpu)

      - name: Run Tests
        run: |
          mkdir -p build-ci/coverage
          cd build-ci && LLVM_PROFILE_FILE="${{ github.workspace }}/build-ci/coverage/%p.profraw" ctest --output-on-failure

      - name: Generate Coverage Report
        run: |
          xcrun llvm-profdata merge -sparse build-ci/coverage/*.profraw -o build-ci/coverage/merged.profdata
          TESTS_BIN=$(find build-ci -name BoomBabyTests -type f -perm +111 | head -1)
          xcrun llvm-cov export "$TESTS_BIN" \
            -instr-profile=build-ci/coverage/merged.profdata \
            -format=lcov \
            -ignore-filename-regex='(JUCE|_deps|build-ci/_deps)' \
            > build-ci/coverage/lcov.info

      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v7

      - name: Build with Build Wrapper
        run: >
          build-wrapper-macosx-x86 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }}
          cmake --build build-ci --target BoomBaby_Standalone -- -j$(sysctl -n hw.ncpu)

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define "sonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json"
            --define "sonar.coverageReportPaths=build-ci/coverage/lcov.info"
